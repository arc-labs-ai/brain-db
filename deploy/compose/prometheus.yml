# Prometheus config for the Brain compose stack.
# Mounted at /etc/prometheus/prometheus.yml inside the prometheus
# container. Alert rules under monitoring/alerts/ are mounted at
# /etc/prometheus/rules.
#
# This file is for the compose stack. For an existing Prometheus
# install, see docs/guides/observability.md for the scrape job
# snippet to merge into your own config.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: brain-compose

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: brain
    metrics_path: /metrics
    static_configs:
      - targets: ["brain:9091"]
        labels:
          service: brain-server

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8888"]
